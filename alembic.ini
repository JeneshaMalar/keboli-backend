[alembic]
script_location = src/data/migrations
prepend_sys_path=src
version_path_separator=os
sqlalchemy.url = postgresql+asyncpg://keboli_user:jene2011@localhost:5432/keboli

[loggers]
keys=root,alembic,sqlalchemy

[handlers]
keys=console

[formatters]
keys=generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S